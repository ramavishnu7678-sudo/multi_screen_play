<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TV Client</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: Arial, sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

  #media-wrap { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

  #vid { width: 100%; height: 100%; object-fit: contain; display: none; }
  #img { width: 100%; height: 100%; object-fit: contain; display: none; }

  #idle { display: flex; flex-direction: column; align-items: center; gap: 16px; position: absolute; text-align: center; }
  #idle .tv-icon { font-size: 72px; }
  #idle h1 { font-size: 28px; font-weight: 700; }
  #idle p { color: #475569; font-size: 15px; }

  /* Bottom info bar */
  #infobar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,.85));
    padding: 24px 20px 14px;
    display: none; flex-direction: column; gap: 4px;
  }
  #ib-title { font-size: 14px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #ib-meta { font-size: 11px; color: #64748b; display: flex; gap: 14px; }
  #ib-progress { height: 2px; background: #1e293b; border-radius: 2px; margin-top: 6px; overflow: hidden; }
  #ib-bar { height: 100%; background: #3b82f6; border-radius: 2px; width: 0; transition: width linear; }

  /* Connection badge */
  #conn { position: fixed; top: 12px; right: 14px; font-size: 11px; padding: 4px 10px; border-radius: 12px; background: rgba(0,0,0,.5); font-weight: 600; }
  #conn.on { color: #22c55e; }
  #conn.off { color: #ef4444; }
</style>
</head>
<body>

<div id="media-wrap">
  <div id="idle">
    <div class="tv-icon">📺</div>
    <h1 id="tvLabel">Connecting…</h1>
    <p>Waiting for content from the admin panel</p>
  </div>
  <video id="vid" autoplay playsinline></video>
  <img id="img" alt="">
</div>

<div id="infobar">
  <div id="ib-title">—</div>
  <div id="ib-meta">
    <span id="ib-type">—</span>
    <span id="ib-pos">Item 1 of 1</span>
    <span id="ib-loop"></span>
  </div>
  <div id="ib-progress"><div id="ib-bar"></div></div>
</div>

<div id="conn" class="off">Connecting…</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const DEVICE_ID = decodeURIComponent(location.pathname.split('/client/')[1] || 'TV');

// DOM refs
const vid = document.getElementById('vid');
const img = document.getElementById('img');
const idle = document.getElementById('idle');
const infobar = document.getElementById('infobar');
const ibTitle = document.getElementById('ib-title');
const ibType = document.getElementById('ib-type');
const ibPos = document.getElementById('ib-pos');
const ibLoop = document.getElementById('ib-loop');
const ibBar = document.getElementById('ib-bar');
const conn = document.getElementById('conn');
const tvLabel = document.getElementById('tvLabel');

tvLabel.textContent = DEVICE_ID;

// ─── PLAYLIST STATE ───
let playlist = null;
let currentIdx = 0;
let loopEnabled = false;
let loopUntil = null;
let itemTimer = null;
let isPaused = false; // admin-issued pause (don't auto-resume this)

// ─── WAKE LOCK — prevents screen/browser from sleeping ───
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Wake lock acquired');
      wakeLock.addEventListener('release', () => {
        console.log('Wake lock released — re-requesting');
        requestWakeLock();
      });
    }
  } catch (e) {
    console.warn('Wake lock not available:', e.message);
  }
}

// Re-acquire wake lock when tab becomes visible again
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    await requestWakeLock();
    // If video was playing before page hid, resume it
    if (!isPaused && playlist && vid.style.display !== 'none' && vid.paused) {
      console.log('Page became visible — resuming video');
      vid.play().catch(console.error);
    }
  }
});

// ─── AUTO-RESUME if browser pauses video unexpectedly ───
vid.addEventListener('pause', () => {

  // Video already completed → don't resume
  if (vid.ended) return;

  // Only auto-resume if this was NOT an admin-issued pause
  if (!isPaused && playlist) {

    console.log('Unexpected pause detected — resuming');

    setTimeout(() => {

      if (!isPaused && playlist && vid.paused && !vid.ended) {
        vid.play().catch(console.error);
      }

    }, 500);

  }

});

// ─── KEEP-ALIVE PING every 30s to prevent browser throttling ───
setInterval(() => {
  if (!isPaused && playlist && vid.style.display !== 'none' && vid.paused) {
    console.log('Keep-alive: video was paused unexpectedly — resuming');
    vid.play().catch(console.error);
  }
}, 30000);

// ─── SHOW IDLE ───
function showIdle() {
  vid.style.display = 'none';
  img.style.display = 'none';
  idle.style.display = 'flex';
  infobar.style.display = 'none';
  clearItemTimer();
}

// ─── PLAY PLAYLIST ───
function startPlaylist(pl, loop, until) {
  playlist = pl;
  loopEnabled = loop;
  loopUntil = until ? new Date(until) : null;
  currentIdx = 0;
  isPaused = false;

  socket.emit("playback-status", {
    deviceId: DEVICE_ID,
    status: "playing"
  });

  playCurrentItem();
}

function playCurrentItem() {
  if (!playlist || !playlist.items || !playlist.items.length) return showIdle();

  if (loopUntil && new Date() >= loopUntil) return stopAll();

  const item = playlist.items[currentIdx];
  if (!item) return showIdle();

  idle.style.display = 'none';
  infobar.style.display = 'flex';

  ibTitle.textContent = item.original_name;
  ibType.textContent = item.media_type === 'image' ? '🖼 Image' : '🎬 Video';
  ibPos.textContent = `Item ${currentIdx + 1} of ${playlist.items.length}`;
  ibLoop.textContent = loopEnabled ? (loopUntil ? '🔁 Until ' + loopUntil.toLocaleString() : '🔁 Looping') : '';

  if (item.media_type === 'image') {
    vid.style.display = 'none';
    vid.pause();
    img.src = '/media/' + item.filename;
    img.style.display = 'block';
    startProgressBar(item.display_duration || 10);
    itemTimer = setTimeout(() => advanceItem(), (item.display_duration || 10) * 1000);
  } else {
    img.style.display = 'none';
    vid.loop = false;
    vid.src = '/media/' + item.filename;
    vid.style.display = 'block';
    ibBar.style.transition = 'none';
    ibBar.style.width = '0';
    vid.play().catch(console.error);
  }
}

function advanceItem() {
  clearItemTimer();
  currentIdx++;
  if (currentIdx >= playlist.items.length) {
    if (loopEnabled && (!loopUntil || new Date() < loopUntil)) {
      currentIdx = 0;
      playCurrentItem();
    } else {
      stopAll();
    }
  } else {
    playCurrentItem();
  }
}

function stopAll() {
  clearItemTimer();
  playlist = null;
  isPaused = false;
  vid.pause();
  vid.src = '';
  img.src = '';

  socket.emit("playback-status", {
    deviceId: DEVICE_ID,
    status: "stopped"
  });

  showIdle();
}

function clearItemTimer() {
  if (itemTimer) { clearTimeout(itemTimer); itemTimer = null; }
}

function startProgressBar(durationSec) {
  ibBar.style.transition = 'none';
  ibBar.style.width = '0';
  void ibBar.offsetWidth;
  ibBar.style.transition = `width ${durationSec}s linear`;
  ibBar.style.width = '100%';
}

// ─── VIDEO ENDED → advance ───
vid.addEventListener('ended', () => {

  console.log("Video completed");

  advanceItem();

});

// ─── SOCKET ───
const socket = io();

socket.on('connect', () => {
  conn.textContent = '🟢 Connected'; conn.className = 'on';
  socket.emit('register-device', DEVICE_ID);
  requestWakeLock();
  restoreState();
});

socket.on('disconnect', () => {
  conn.textContent = '🔴 Disconnected'; conn.className = 'off';
});

socket.on('action', data => {
  console.log('action:', data);
  if (data.type === 'load_playlist') {
    isPaused = false;
    startPlaylist(data.playlist, data.loop, data.loopUntil);
  } else if (data.type === 'resume') {
    isPaused = false;
    vid.play().catch(console.error);
    ibTitle.textContent = ibTitle.textContent.replace(' (paused)', '');
  } else if (data.type === 'pause') {
    isPaused = true; // mark as intentional so auto-resume doesn't fight it
    clearItemTimer();
    vid.pause();
    ibTitle.textContent = ibTitle.textContent.replace(' (paused)', '') + ' (paused)';
  } else if (data.type === 'stop') {
    isPaused = false;
    stopAll();
  }
});

// ─── RESTORE STATE ON RECONNECT ───
async function restoreState() {
  try {
    const tv = await fetch('/api/tv-info/' + encodeURIComponent(DEVICE_ID)).then(r => r.json());
    tvLabel.textContent = tv.name || DEVICE_ID;
    if (tv.playback_status === 'playing' && tv.playlist) {
      startPlaylist(tv.playlist, !!tv.loop_enabled, tv.loop_until);
    }
  } catch (e) { console.error(e); }
}

// ─── FIRST CLICK to unlock audio ───
document.addEventListener('click', () => {
  if (vid.paused && !isPaused && playlist) {
    vid.play().catch(console.error);
  }
}, { once: true });
</script>
</body>
</html>
