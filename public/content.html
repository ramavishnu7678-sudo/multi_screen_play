<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnoSpace · Content Library</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-icon">▣</div><div><div class="brand-name">InnoSpace</div><div class="brand-sub">Global Network</div></div></div>
    <nav class="nav">
      <a href="/"><span class="ni">⌂</span> Home</a>
      <a href="/content" class="active"><span class="ni">▤</span> Content</a>
    </nav>
  </aside>
  <div class="main">
    <div class="topnav">
      <div class="search">🔍 Search content library…</div>
      <div class="topnav-r">
        <button class="icon-btn">🔔</button><button class="icon-btn">⚙</button>
        <div class="user-chip"><div class="avatar">A</div> Admin User</div>
      </div>
    </div>
    <div class="content">
      <div class="page-head">
        <div><h1>Content Library</h1><p>Manage digital signage assets — videos and images.</p></div>
        <div class="head-r">
          <span id="countBadge" class="pill">0 items</span>
          <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">⬆ Upload Content</button>
        </div>
      </div>

      <div class="tabs">
        <button class="active" id="tabAll" onclick="setTab('all')">All Media</button>
        <button id="tabVideo" onclick="setTab('video')">Videos</button>
        <button id="tabImage" onclick="setTab('image')">Images</button>
      </div>

      <div id="mediaGrid" class="media-grid"></div>

      <br>
      <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="u-icon">⬆</div>
        Drag &amp; drop files here, or click to browse<br>
        <span style="font-size:11px">Videos: MP4, WebM, MOV &nbsp;|&nbsp; Images: JPG, PNG, GIF, WebP</span>
      </div>
      <input type="file" id="fileInput" accept="video/*,image/*" multiple style="display:none" onchange="handleFiles(this.files)">
    </div>
  </div>
</div>

<script>
let allContent = [];
let currentTab = 'all';

function fmtBytes(b) {
  if (!b) return '—';
  const mb = b / 1048576;
  return mb >= 1 ? mb.toFixed(1) + ' MB' : Math.round(b / 1024) + ' KB';
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function setTab(tab) {
  currentTab = tab;
  ['All','Video','Image'].forEach(t => {
    const btn = document.getElementById('tab' + t);
    if (btn) btn.classList.toggle('active', t.toLowerCase() === tab || (tab === 'all' && t === 'All'));
  });
  renderGrid();
}

function renderGrid() {
  const filtered = currentTab === 'all' ? allContent : allContent.filter(c => c.media_type === currentTab);
  const grid = document.getElementById('mediaGrid');
  document.getElementById('countBadge').textContent = `${allContent.length} item${allContent.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="ei">${currentTab === 'image' ? '🖼' : '🎬'}</div><h3>No ${currentTab === 'all' ? 'content' : currentTab + 's'} uploaded yet</h3><p>Use "Upload Content" or drag files here.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(c => `
    <div class="media-card">
      <div class="m-thumb">
        ${c.media_type === 'image'
          ? `<img src="/media/${c.filename}" alt="${c.original_name}" loading="lazy">`
          : '🎬'}
        <span class="m-type-badge">${c.media_type}</span>
      </div>
      <div class="m-body">
        <div class="m-name" title="${c.original_name}">${c.original_name}</div>
        <div class="m-meta"><span>${fmtBytes(c.size_bytes)}</span><span>${fmtDate(c.uploaded_at)}</span></div>
        <div class="m-actions">
          <a href="/media/${c.filename}" target="_blank" style="flex:1"><button class="btn btn-outline btn-xs" style="width:100%">Preview</button></a>
          <button class="btn btn-danger btn-xs" onclick="deleteContent(${c.id},'${c.original_name.replace(/'/g,'')}')">🗑</button>
        </div>
      </div>
    </div>`).join('');
}

async function loadContent() {
  allContent = await fetch('/api/content').then(r => r.json());
  renderGrid();
}

async function handleFiles(files) {
  if (!files || !files.length) return;
  const form = new FormData();
  for (const f of files) form.append('files', f);
  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'Uploading…'; btn.disabled = true;
  const result = await fetch('/api/upload', { method: 'POST', body: form }).then(r => r.json());
  btn.textContent = '⬆ Upload Content'; btn.disabled = false;
  document.getElementById('fileInput').value = '';
  alert(result.message);
  loadContent();
}

async function deleteContent(id, name) {
  if (!confirm(`Delete "${name}"? This removes it from all playlists.`)) return;
  const r = await fetch(`/api/content/${id}`, { method: 'DELETE' }).then(r => r.json());
  alert(r.message);
  loadContent();
}

// Drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = 'var(--blue)'; });
dz.addEventListener('dragleave', () => { dz.style.borderColor = ''; });
dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor = ''; handleFiles(e.dataTransfer.files); });

loadContent();
</script>
</body>
</html>
