<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnoSpace · Devices</title>
<link rel="stylesheet" href="/style.css">
<style>
  .pl-preview { display:none; background:#f8fafc; border-top:1px solid var(--border); padding:10px 16px; }
  .pl-preview.open { display:block; }
  .pl-items { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .pl-item { display:flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:12px; }
  .pl-item .pi-icon { font-size:14px; }
  .pl-item .pi-name { max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
  .pl-name-link { color:var(--blue); cursor:pointer; text-decoration:none; font-weight:600; font-size:12.5px; display:flex; align-items:center; gap:5px; }
  .pl-name-link:hover { text-decoration:underline; }
  .pl-toggle-icon { font-size:10px; transition:transform .2s; display:inline-block; }
  .pl-toggle-icon.open { transform:rotate(90deg); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-icon">▣</div><div><div class="brand-name">InnoSpace</div><div class="brand-sub">Global Network</div></div></div>
    <nav class="nav">
      <a href="/"><span class="ni">⌂</span> Home</a>
      <a href="/devices" class="active"><span class="ni">▭</span> Devices</a>
      <a href="/content"><span class="ni">▤</span> Content</a>
    </nav>
  </aside>
  <div class="main">
    <div class="topnav">
      <div class="search">🔍 Search devices…</div>
      <div class="topnav-r">
        <button class="icon-btn">🔔</button><button class="icon-btn">⚙</button>
        <div class="user-chip"><div class="avatar">A</div> Admin User</div>
      </div>
    </div>
    <div class="content">
      <div class="page-head">
        <div><h1>Registered Devices</h1><p>Manage and monitor your global signage network.</p></div>
        <div class="head-r">
          <button class="btn btn-primary" onclick="openModal('addDeviceModal')">+ Add Device</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Device Name</th>
              <th>UUID</th>
              <th>IP Address</th>
              <th>Status</th>
              <th>Now Playing</th>
              <th>Playback</th>
              <th>Last Seen</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tvBody"><tr><td colspan="8" class="empty-row">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ADD DEVICE -->
<div class="overlay" id="addDeviceModal">
  <div class="modal">
    <div class="modal-head"><h3>Add Device</h3><button class="modal-x" onclick="closeModal('addDeviceModal')">✕</button></div>
    <div class="modal-body">
      <div class="field"><label class="label">Device Name *</label><input type="text" id="nd-name" placeholder="e.g. Reception Display"></div>
      <div class="row-2">
        <div class="field"><label class="label">Location</label><input type="text" id="nd-loc" placeholder="e.g. Lobby"></div>
        <div class="field"><label class="label">IP Address</label><input type="text" id="nd-ip" placeholder="192.168.1.x"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('addDeviceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddDevice()">Add Device</button>
    </div>
  </div>
</div>

<div class="overlay" id="createdModal">
  <div class="modal">
    <div class="modal-head"><h3>✅ Device Created</h3><button class="modal-x" onclick="closeModal('createdModal')">✕</button></div>
    <div class="modal-body">
      <div class="field"><label class="label">UUID</label><input type="text" id="cr-uid" readonly class="mono"></div>
      <div class="field"><label class="label">Client URL</label><input type="text" id="cr-link" readonly></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="copyField('cr-link')">📋 Copy</button>
      <button class="btn btn-primary" onclick="closeModal('createdModal')">Done</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let allDevices = [];
const playlistCache = {};

function timeAgo(iso) {
  if (!iso) return 'Never';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function renderTable() {
  const tbody = document.getElementById('tvBody');
  if (!allDevices.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-row">No devices registered yet.</td></tr>';
    return;
  }

  tbody.innerHTML = allDevices.map(d => {
    // Fix 2: show real IP address
    const ip = d.ip_address && d.ip_address !== '' ? d.ip_address : '—';

    // Fix 1 & 3: show playlist name + clickable to expand
    let nowPlaying = '—';
    if (d.current_playlist_id) {
      nowPlaying = `
        <span class="pl-name-link" onclick="togglePlaylist(${d.current_playlist_id}, ${d.id})">
          <span class="pl-toggle-icon" id="toggle-icon-${d.id}">▶</span>
          🎬 ${playlistCache[d.current_playlist_id] ? playlistCache[d.current_playlist_id].name : 'Playlist #' + d.current_playlist_id}
        </span>`;
    }

    return `
    <tr id="row-${d.id}">
      <td><b>${d.name}</b>${d.location ? `<br><span class="mono" style="font-size:10.5px">${d.location}</span>` : ''}</td>
      <td class="mono" style="font-size:11px">${d.uid}</td>
      <td><span class="mono" style="font-size:12px">${ip}</span></td>
      <td><span class="status-chip ${d.is_online ? 'online' : 'offline'}"><span class="dot"></span>${d.is_online ? 'Online' : 'Offline'}</span></td>
      <td>${nowPlaying}</td>
      <td><span class="status-chip ${d.playback_status || 'stopped'}">${d.playback_status || 'stopped'}</span></td>
      <td>${timeAgo(d.last_seen)}</td>
      <td style="display:flex;gap:5px;flex-wrap:wrap">
        <a href="/client/${encodeURIComponent(d.device_id)}" target="_blank"><button class="btn btn-outline btn-xs">Open TV</button></a>
        <button class="btn btn-danger btn-xs" onclick="deleteDevice(${d.id},'${d.name.replace(/'/g,'')}')">🗑</button>
      </td>
    </tr>
    <tr id="pl-expand-${d.id}" style="display:none">
      <td colspan="8" style="padding:0">
        <div class="pl-preview open" id="pl-preview-${d.id}">Loading playlist…</div>
      </td>
    </tr>`;
  }).join('');

  // Pre-fetch playlists for devices that are playing
  allDevices.filter(d => d.current_playlist_id).forEach(d => {
    fetchPlaylist(d.current_playlist_id);
  });
}

async function fetchPlaylist(plId) {
  if (playlistCache[plId]) return playlistCache[plId];
  const pl = await fetch(`/api/playlists/${plId}`).then(r => r.json()).catch(() => null);
  if (pl) playlistCache[plId] = pl;
  return pl;
}

async function togglePlaylist(plId, deviceId) {
  const expandRow = document.getElementById(`pl-expand-${deviceId}`);
  const preview = document.getElementById(`pl-preview-${deviceId}`);
  const icon = document.getElementById(`toggle-icon-${deviceId}`);

  const isOpen = expandRow.style.display !== 'none';
  if (isOpen) {
    expandRow.style.display = 'none';
    icon.classList.remove('open');
    return;
  }

  // Show the row and fetch playlist
  expandRow.style.display = 'table-row';
  icon.classList.add('open');

  const pl = await fetchPlaylist(plId);
  if (!pl || !pl.items || !pl.items.length) {
    preview.innerHTML = '<span style="color:var(--faint);font-size:12px">No items in this playlist.</span>';
    return;
  }

  // Update playlist name in the link
  document.querySelectorAll(`#row-${deviceId} .pl-name-link`).forEach(el => {
    const span = el.querySelector('.pl-toggle-icon');
    el.innerHTML = '';
    const icon2 = document.createElement('span');
    icon2.className = 'pl-toggle-icon open';
    icon2.id = `toggle-icon-${deviceId}`;
    icon2.textContent = '▶';
    el.appendChild(icon2);
    el.appendChild(document.createTextNode(` 🎬 ${pl.name}`));
  });

  preview.innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--dim);margin-bottom:8px">
      📋 ${pl.name} — ${pl.items.length} item${pl.items.length !== 1 ? 's' : ''}
    </div>
    <div class="pl-items">
      ${pl.items.map((item, i) => `
        <div class="pl-item">
          <span class="pi-icon">${item.media_type === 'image' ? '🖼' : '🎬'}</span>
          <span style="color:var(--faint);font-size:10px;font-weight:700">${i + 1}</span>
          <span class="pi-name" title="${item.original_name}">${item.original_name}</span>
          <span style="color:var(--faint);font-size:10px;text-transform:uppercase">${item.media_type}</span>
        </div>`).join('')}
    </div>`;
}

async function loadDevices() {
  allDevices = await fetch('/api/tvs').then(r => r.json());
  renderTable();
}

async function deleteDevice(id, name) {
  if (!confirm(`Remove "${name}"?`)) return;
  await fetch(`/api/tvs/${id}`, { method: 'DELETE' });
  loadDevices();
}

async function submitAddDevice() {
  const name = document.getElementById('nd-name').value.trim();
  if (!name) return alert('Enter a device name');
  const tv = await fetch('/api/tvs', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, location: document.getElementById('nd-loc').value.trim(), ip_address: document.getElementById('nd-ip').value.trim() })
  }).then(r => r.json());
  closeModal('addDeviceModal');
  document.getElementById('cr-uid').value = tv.uid;
  document.getElementById('cr-link').value = `${location.origin}/client/${tv.device_id}`;
  openModal('createdModal');
  loadDevices();
}

function copyField(id) { const el = document.getElementById(id); el.select(); document.execCommand('copy'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

socket.on('tv-list-full', tvs => { allDevices = tvs; renderTable(); });

loadDevices();
</script>
</body>
</html>
